version: '3'

vars:
  PROJECT_ROOT:
    sh: pwd
  GOBIN: '{{.PROJECT_ROOT}}/bin'
  GOLANGCI_LINT_BINARY: '{{.GOBIN}}/golangci-lint'
  REQUIRED_GOLANGCI_LINT_VERSION:
    sh: cat .golangci.version 2>/dev/null || echo "2.9.0"
  GOLANGCI_LINT_VERSION:
    sh: >
      {{.GOLANGCI_LINT_BINARY}} version --format short 2>/dev/null ||
      {{.GOLANGCI_LINT_BINARY}} version --short 2>/dev/null ||
      echo "not-installed"

env:
  GOBIN: '{{.GOBIN}}'

tasks:
  default:
    desc: Run lint and test
    cmds:
      - task: lint
      - task: test

  help:
    desc: Show this help message
    cmds:
      - echo "GoZod - TypeScript Zod v4-inspired validation library for Go"
      - echo "Available targets:"
      - task --list
    silent: true

  clean:
    desc: Clean build artifacts and caches
    cmds:
      - echo "Cleaning build artifacts..."
      - rm -rf {{.GOBIN}}
      - go clean -cache -testcache || true

  deps:
    desc: Download Go module dependencies
    cmds:
      - echo "Downloading dependencies..."
      - go mod download
      - go mod tidy


  deps:update:
    desc: Update all dependencies
    cmds:
      - echo "Updating dependencies..."
      - go get -u ./... && go mod tidy

  test:
    desc: Run all tests
    cmds:
      - echo "Running all tests..."
      - |
        go test ./... &
        pid=$!
        (
          while kill -0 "$pid" 2>/dev/null; do
            echo "[test] go test still running..."
            sleep 30
          done
        ) &
        heartbeat=$!
        if wait "$pid"; then
          status=0
        else
          status=$?
        fi
        kill "$heartbeat" 2>/dev/null || true
        wait "$heartbeat" 2>/dev/null || true
        exit "$status"

  test:race:
    desc: Run race-enabled tests for the lightweight utility packages
    cmds:
      - echo "Running race tests for lightweight packages..."
      - |
        go test -race ./core ./pkg/cloneutil ./pkg/regex ./pkg/slicex ./pkg/structx &
        pid=$!
        (
          while kill -0 "$pid" 2>/dev/null; do
            echo "[test:race] go test still running..."
            sleep 30
          done
        ) &
        heartbeat=$!
        if wait "$pid"; then
          status=0
        else
          status=$?
        fi
        kill "$heartbeat" 2>/dev/null || true
        wait "$heartbeat" 2>/dev/null || true
        exit "$status"

  lint:
    desc: Run all linters
    deps:
      - golangci-lint
      - tidy-lint

  install-golangci-lint:
    desc: Install golangci-lint with the required version
    cmds:
      - mkdir -p {{.GOBIN}}
      - |
        if [ "{{.GOLANGCI_LINT_VERSION}}" != "{{.REQUIRED_GOLANGCI_LINT_VERSION}}" ]; then
          echo "Installing golangci-lint v{{.REQUIRED_GOLANGCI_LINT_VERSION}} (current: {{.GOLANGCI_LINT_VERSION}})..."
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh |
            sh -s -- -b {{.GOBIN}} v{{.REQUIRED_GOLANGCI_LINT_VERSION}}
          echo "golangci-lint v{{.REQUIRED_GOLANGCI_LINT_VERSION}} installed successfully"
        fi
    status:
      - test "{{.GOLANGCI_LINT_VERSION}}" = "{{.REQUIRED_GOLANGCI_LINT_VERSION}}"

  golangci-lint:
    desc: Run golangci-lint
    deps:
      - install-golangci-lint
    cmds:
      - '{{.GOLANGCI_LINT_BINARY}} version'
      - echo "Running golangci-lint..."
      - |
        {{.GOLANGCI_LINT_BINARY}} run --allow-parallel-runners --timeout=10m --path-prefix . &
        pid=$!
        (
          while kill -0 "$pid" 2>/dev/null; do
            echo "[lint] golangci-lint still running..."
            sleep 30
          done
        ) &
        heartbeat=$!
        if wait "$pid"; then
          status=0
        else
          status=$?
        fi
        kill "$heartbeat" 2>/dev/null || true
        wait "$heartbeat" 2>/dev/null || true
        exit "$status"

  tidy-lint:
    desc: Check if go.mod and go.sum are tidy
    cmds:
      - echo "Checking go.mod and go.sum are tidy..."
      - go mod tidy
      - git diff --exit-code -- go.mod go.sum

  markdownlint:
    desc: Run markdownlint
    cmds:
      - markdownlint-cli2 "**/*.md"

  yamllint:
    desc: Run yamllint
    cmds:
      - yamllint -s .

  vuln:
    desc: Run govulncheck
    cmds:
      - |
        govulncheck ./... &
        pid=$!
        (
          while kill -0 "$pid" 2>/dev/null; do
            echo "[vuln] govulncheck still running..."
            sleep 30
          done
        ) &
        heartbeat=$!
        if wait "$pid"; then
          status=0
        else
          status=$?
        fi
        kill "$heartbeat" 2>/dev/null || true
        wait "$heartbeat" 2>/dev/null || true
        exit "$status"

  fmt:
    desc: Format Go code
    cmds:
      - echo "Formatting Go code..."
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - echo "Running go vet..."
      - |
        go vet ./... &
        pid=$!
        (
          while kill -0 "$pid" 2>/dev/null; do
            echo "[vet] go vet still running..."
            sleep 30
          done
        ) &
        heartbeat=$!
        if wait "$pid"; then
          status=0
        else
          status=$?
        fi
        kill "$heartbeat" 2>/dev/null || true
        wait "$heartbeat" 2>/dev/null || true
        exit "$status"

  verify:
    desc: Run all verification steps (deps, format, vet, lint, test, vuln)
    cmds:
      - task: deps
      - task: fmt
      - task: vet
      - task: lint
      - task: test
      - task: vuln
      - echo "All verification steps completed successfully ✅"
